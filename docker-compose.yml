services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: ordens_db
    environment:
      POSTGRES_USER: ordens_servico
      POSTGRES_PASSWORD: ordens_servico
      POSTGRES_DB: ordens_servico
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ordens_servico -d ordens_servico"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: ordens_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Single source of database configuration: the connection URL already
      # carries user, password, host and database name.
      DATABASE_URL: ${DATABASE_URL:-postgres://ordens_servico:ordens_servico@postgres:5432/ordens_servico?sslmode=disable}
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@ordens.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
    # Backend is only reachable internally via nginx proxy.
    # Expose BACKEND_PORT (e.g. 8081) locally for direct API / debugging.
    ports:
      - "${BACKEND_PORT:-127.0.0.1:8081}:8080"

  frontend:
    build: ./frontend
    container_name: ordens_frontend
    depends_on:
      - backend
    # Exposed on port 8080 so the platform reverse-proxy (which expects 8080)
    # lands on nginx, which serves the SPA and proxies /api/ to the backend.
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  db_data:
