services:
  db:
    image: postgis/postgis:16-3.4
    container_name: ordens_db
    environment:
      POSTGRES_USER: ${DB_USER:-ordens}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ordens}
      POSTGRES_DB: ${DB_NAME:-ordens_servico}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ordens} -d ${DB_NAME:-ordens_servico}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: ordens_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      # The application connects exclusively via the PostgreSQL/PostGIS URL.
      DATABASE_URL: postgres://${DB_USER:-ordens}:${DB_PASSWORD:-ordens}@db:5432/${DB_NAME:-ordens_servico}?sslmode=disable
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@ordens.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build: ./frontend
    container_name: ordens_frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  db_data:
