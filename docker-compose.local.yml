# Local development with embedded PostgreSQL/PostGIS.
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up --build -d
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ordens_servico
      POSTGRES_PASSWORD: ordens_servico
      POSTGRES_DB: ordens_servico
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ordens_servico -d ordens_servico"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ordens_servico:ordens_servico@postgres:5432/ordens_servico?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@ordens.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  db_data:
